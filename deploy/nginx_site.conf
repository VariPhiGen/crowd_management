server {
    listen 80;
    server_name YOUR_EC2_PUBLIC_IP_OR_DOMAIN;

    client_max_body_size 500M; # Allow large video uploads

    # Static files routing
    location /static/ {
        alias /opt/sober_crowd/web_ui/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy dynamic requests to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running pipeline requests if any block
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }
}
