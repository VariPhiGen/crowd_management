<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimenabi - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="glass-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">Crimenabi</h3>
            <p class="text-white-50">Pipeline Management Interface</p>
        </div>

    {% if error %}
    <div class="alert alert-danger py-2" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label text-white-50">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label text-white-50">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Secure Login</button>
    </form>
    </div>
</div>

</body>
</html>
